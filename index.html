   <style>
        /* Estilos personalizados para el nuevo diseño minimalista */
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh; /* Asegura que el body ocupe toda la altura de la ventana */
            margin: 0;
            /* El color de fondo del body ya está definido en main.css */
            color: #fff; /* Color de texto por defecto para nuevos elementos */
            background-image: url('images/slides/slide-1.jpg');
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        .content-area {
            display: flex;
            justify-content: center;
            align-items: stretch;
            flex-grow: 1; /* Hace que esta área ocupe el espacio disponible */
            padding: 20px; /* Espaciado alrededor del contenedor del video */
            box-sizing: border-box; /* Incluye el padding en el tamaño total del elemento */
        }

        .live-layout {
            width: min(1280px, 100%);
            display: grid;
            grid-template-columns: minmax(0, 1fr) 360px;
            gap: 18px;
            align-items: stretch;
        }

        .video-column,
        .chat-column {
            background: rgba(8, 12, 22, 0.78);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 16px;
            box-shadow: 0 18px 48px rgba(0,0,0,0.35);
            backdrop-filter: blur(8px);
            overflow: hidden;
        }

        .video-column {
            padding: 14px;
        }

        .chat-column {
            display: flex;
            flex-direction: column;
            height: min(70vh, 720px);
            min-height: 520px;
            max-height: 720px;
        }

        .chat-header {
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.05);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        .chat-header h2 {
            margin: 0;
            font-size: 1rem;
            color: #fff;
        }

        .chat-status {
            font-size: 0.8rem;
            color: #f7f7f7;
            border-radius: 999px;
            padding: 4px 10px;
            background: rgba(255,255,255,0.12);
        }

        .chat-status.online {
            background: rgba(46, 204, 113, 0.2);
            color: #8df3b5;
        }

        .chat-messages {
            flex: 1;
            min-height: 0;
            padding: 12px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .chat-message {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 10px 12px;
        }

        .chat-message-meta {
            font-size: 0.74rem;
            color: #f5b56a;
            margin-bottom: 4px;
        }

        .chat-message-content {
            font-size: 0.9rem;
            color: #fff;
            line-height: 1.35;
            word-break: break-word;
        }

        .chat-form {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
            padding: 12px;
            border-top: 1px solid rgba(255,255,255,0.08);
            background: rgba(0,0,0,0.2);
        }

        .chat-form input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid rgba(255,255,255,0.14);
            background: rgba(255,255,255,0.08);
            color: #fff;
            border-radius: 10px;
            box-sizing: border-box;
        }

        .chat-form input::placeholder {
            color: rgba(255,255,255,0.6);
        }

        .chat-form button {
            border: 0;
            border-radius: 10px;
            background: #c25d02;
            color: #fff;
            padding: 11px 14px;
            font-weight: 700;
            cursor: pointer;
        }

        .chat-form button:hover {
            background: #d56e08;
        }

        @media (max-width: 980px) {
            .live-layout {
                grid-template-columns: 1fr;
            }

            .chat-column {
                height: 420px;
                min-height: 420px;
                max-height: 420px;
            }
        }

        .video-responsive-container {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            min-height: 320px;
            background: #000;
        }

        .video-responsive-container iframe {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        footer {
            padding: 20px;
            text-align: center;
            background-color: #1111112d; /* Fondo más oscuro para el pie de página */
            color: rgba(255, 255, 255, 0.5);
        }

        .social-links-footer ul {
            list-style: none;
            padding: 0;
            margin: 0 0 10px 0;
            display: flex;
            justify-content: center;
            gap: 20px; /* Espacio entre los íconos sociales */
        }

        .social-links-footer ul li {
            display: inline-block;
        }

        .social-links-footer a {
            color: #fff;
            font-size: 2.5rem; /* Íconos más grandes */
            text-decoration: none;
        }

        .social-links-footer a:hover {
            color: #c25d02; /* Color hover de main.css */
        }

        .footer-bottom-links ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .footer-bottom-links ul li {
            display: inline-block;
        }

        .footer-bottom-links a {
            color: rgba(255, 255, 255, 0.5);
            text-decoration: none;
        }

        .footer-bottom-links a:hover {
            color: #c25d02;
        }

        .credits-footer {
            margin-top: 10px;
            font-size: 0.9rem;
        }

        .credits-footer a {
            color: rgba(255, 255, 255, 0.3);
            text-decoration: none;
        }

        .credits-footer a:hover {
            color: #c25d02;
        }

        /* Clase de accesibilidad para ocultar texto visualmente */
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border-width: 0;
        }

        .social-links-main {
            text-align: center;
            padding: 20px 0;
        }

        .social-links-main ul {
            list-style: none;
            padding: 0;
            margin: 0;
            display: inline-flex; /* Usa inline-flex para que el contenedor se ajuste al contenido */
            justify-content: center;
            gap: 25px; /* Espacio entre los íconos */
        }

        .social-links-main ul li {
            display: inline-block;
        }

        .social-links-main a {
            color: #fff;
            font-size: 3rem; /* Íconos un poco más grandes */
            text-decoration: none;
            transition: color 0.3s ease; /* Transición suave para el color */
        }

        .social-links-main a:hover {
            color: #c25d02; /* Mismo color hover que en el footer */
        }


   </style>
